# ~/dotfiles/starship/starship.toml

# ============================================================================
# CONFIGURACIÓN GENERAL DE STARSHIP
# ============================================================================

# Formato principal del prompt (orden de los módulos)
format = """
[╭─](bold green)\
$directory\
$git_branch\
$git_status\
$package\
$rust\
$golang\
$nodejs\
$python\
$php\
$ruby\
$java\
$container\
$docker_context\
$kubernetes\
$terraform\
$memory_usage\
$aws\
$env_var\
$crystal\
$cmd_duration\
$line_break\
[╰─](bold green)$character"""

# Tiempo de espera para comandos largos (en milisegundos)
command_timeout = 500

# ============================================================================
# MÓDULOS PRINCIPALES
# ============================================================================

# Directorio actual - Muestra la ruta con estilo
[directory]
format = "[$path]($style) "
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"
use_os_path_sep = true

# Rama de Git - Muestra la rama actual
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

# Estado de Git - Muestra cambios pendientes
[git_status]
style = "bold yellow"
format = "([$all_status$ahead_behind]($style)) "
conflicted = "🏴"
ahead = "🏎️$count"
behind = "🔙$count"
diverged = "🏎️$ahead_count🔙$behind_count"
up_to_date = "✓"
untracked = "❓$count"
stashed = "📦$count"
modified = "📝$count"
staged = "➕$count"
renamed = "🔄$count"
deleted = "❌$count"

# Paquete - Versión del proyecto (package.json, Cargo.toml, etc.)
[package]
format = "via [$symbol$version]($style) "
symbol = "📦 "
style = "bold red"

# ============================================================================
# LENGUAJES DE PROGRAMACIÓN
# ============================================================================

# Rust
[rust]
format = "via [$symbol$version]($style) "
symbol = "🦀 "
style = "bold red"

# Go
[golang]
format = "via [$symbol$version]($style) "
symbol = "🐹 "
style = "bold cyan"

# Node.js
[nodejs]
format = "via [$symbol$version]($style) "
symbol = "⬢ "
style = "bold green"

# Python
[python]
format = "via [${symbol}${pyenv_prefix}(${version} )(${virtualenv})]($style) "
symbol = "🐍 "
style = "bold yellow"
pyenv_version_name = true
pyenv_prefix = "⬆️ "

# PHP
[php]
format = "via [$symbol$version]($style) "
symbol = "🐘 "
style = "bold purple"

# Ruby
[ruby]
format = "via [$symbol$version]($style) "
symbol = "💎 "
style = "bold red"

# Java
[java]
format = "via [$symbol$version]($style) "
symbol = "☕ "
style = "bold red"

# ============================================================================
# HERRAMIENTAS Y CONTENEDORES
# ============================================================================

# Docker
[docker_context]
format = "via [$symbol$context]($style) "
symbol = "🐳 "
style = "bold cyan"
only_with_files = true

# Kubernetes
[kubernetes]
format = "via [$symbol$context]($style) "
symbol = "☸️ "
style = "bold blue"
contexts = ["*"]

# AWS
[aws]
format = 'on [$symbol($profile )($region)]($style) '
symbol = "☁️ "
style = "bold yellow"
region_aliases = { "us-east-1" = "use1", "eu-west-1" = "euw1" }

# Memoria
[memory_usage]
format = "$symbol[$used]($style) "
symbol = "💾 "
style = "bold dimmed white"
threshold = 50

# ============================================================================
# PERSONALIZACIONES ADICIONALES
# ============================================================================

# Tiempo de ejecución del comando
[cmd_duration]
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = true
min_time = 1000

# Carácter del prompt (el símbolo que ves al final)
[character]
format = "$symbol "
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"

# Línea de separación (visualmente agradable)
[line_break]
disabled = false

# Variables de entorno personalizadas
[env_var]
format = "with [$env_value]($style) "
variable = "JAVA_HOME"
style = "bold red"

# Container (Docker, Podman)
[container]
format = "via [$symbol]($style) "
symbol = "📦 "
style = "bold blue"

# Terraform
[terraform]
format = "via [$symbol$version]($style) "
symbol = "🏗️ "
style = "bold purple"

# Crystal
[crystal]
format = "via [$symbol$version]($style) "
symbol = "🔮 "
style = "bold red"