# ==========================================
# GLANCES CONFIG — draexx/dotfiles
# Compatible: Linux + macOS
# ==========================================


# ==========================================
# 1. GLOBAL
# ==========================================
[global]

# Intervalo de refresco en segundos
refresh=2

# Historial máximo de puntos para gráficas
history_size=1200


# ==========================================
# 2. APARIENCIA
# ==========================================
[outputs]

# Tema (disponibles: default, monokai, black, white, darkgray)
curse_theme=darkgray


# ==========================================
# 3. CPU
# ==========================================
[cpu]

# Umbrales de advertencia y alerta (%)
careful=60
warning=75
critical=90


# ==========================================
# 4. MEMORIA RAM
# ==========================================
[mem]

# Umbrales de uso de RAM (%)
careful=60
warning=75
critical=90


# ==========================================
# 5. SWAP
# ==========================================
[memswap]

careful=40
warning=60
critical=80


# ==========================================
# 6. CARGA DEL SISTEMA (Load)
# ==========================================
[load]

# Multiplicadores sobre el número de CPUs
careful=0.7
warning=1.0
critical=5.0


# ==========================================
# 7. DISCO (uso de particiones)
# ==========================================
[fs]

# Umbrales de uso de disco (%)
careful=60
warning=75
critical=90

# Particiones a ocultar (tmpfs, devtmpfs, etc.)
hide=/boot.*,/snap.*

# Mostrar inodos
show_inode_percent=True


# ==========================================
# 8. RED
# ==========================================
[network]

# Interfaces a ocultar
# hide=lo,docker.*,veth.*,br-.*

# Umbral de tráfico para destacar (bytes/s)
careful=10000000
warning=100000000
critical=1000000000


# ==========================================
# 9. TEMPERATURA
# ==========================================
[sensors]

# Umbrales de temperatura en °C
careful=60
warning=75
critical=90

# Ocultar sensores con nombres de hardware específicos
# hide=acpitz.*


# ==========================================
# 10. PROCESOS
# ==========================================
[processlist]

# Número de procesos a mostrar por defecto
max_processes=30

# Columnas a mostrar (cpu_percent, mem_percent, name, username, nice, status, etc.)
# Orden de columnas
# columns=cpu_percent,mem_percent,name,username

# Ocultar procesos del kernel (kthreads)
disable=False


# ==========================================
# 11. DOCKER / CONTAINERS
# ==========================================
[docker]

# Activar monitoreo de containers Docker
disable=False

# Máximo de containers a mostrar
max_names=10


# ==========================================
# 12. HISTORIAL / EXPORTACIÓN (opcional)
# ==========================================
[graph]

# Directorio para guardar gráficas (si usás glances --export graph)
path=/tmp/glances


# ==========================================
# 13. SERVIDOR WEB (glances -w)
# ==========================================

# Puerto del servidor web integrado (default: 61208)
# port=61208

# Contraseña para el servidor web (dejar vacío = sin auth)
# password=


# ==========================================
# 14. PLUGINS DESACTIVADOS
# ==========================================
# Descomenta lo que no uses para acelerar glances

# [irq]
# disable=True

# [raid]
# disable=True

# [cloud]
# disable=True

# [smart]
# disable=True