# ==========================================
# 1. FUENTES Y TIPOGRAFIA (Hack)
# ==========================================
font_family      Hack Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.5

# Ajuste sutil para que los iconos no se corten
adjust_line_height  110%

# ==========================================
# 2. DISE ^qO MINIMALISTA (Estilo Warp)
# ==========================================
# Ocultar por completo la barra de t  tulo superior del sistema operativo
hide_window_decorations yes

# ==========================================
# COLORES ESTILO GNOME TERMINAL
# ==========================================
# El fondo negro/gris oscuro cl  sico de GNOME
background            #171717
foreground            #d3d7cf

# Fondo ligeramente opaco pero profesional (sin llegar a distraer)
background_opacity 0.90

# Margen interno para que el texto no quede pegado a los bordes de la pantalla
window_padding_width 10

# Evitar el parpadeo molesto del cursor
cursor_blink_interval 0.5

# ==========================================
# 3. BARRA DE PESTA ^qAS INTEGRADA
# ==========================================
# Posiciona las pesta  as arriba (puedes cambiar a 'bottom' si prefieres abajo)
tab_bar_edge top

# Estilo moderno tipo flechas continuas (Powerline)
tab_bar_style powerline
tab_powerline_style angled

# Colores limpios para saber qu   pesta  a est   activa
active_tab_foreground   #000
active_tab_background   #888888
active_tab_font_style   bold
inactive_tab_foreground #444
inactive_tab_background #1a1a1a

# ==========================================
# 4. ATAJOS DE TECLADO R ^aPIDOS
# ==========================================
# Gesti  n de Pesta  as (Igual que en los navegadores modernos)
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+alt+t set_tab_title

# Copiar y pegar tradicional en terminales avanzadas
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Paleta de colores est  ndar (ANSI)
color0  #2e3436
color1  #cc0000
color2  #4e9a06
color3  #c4a000
color4  #3465a4
color5  #75507b
color6  #06989a
color7  #d3d7cf

# Paleta de colores brillantes (Para resaltar c  digo)
color8  #555753
color9  #ef2929
color10 #8ae234
color11 #fce94f
color12 #729fcf
color13 #ad7fa8
color14 #34e2e2
color15 #eeeeec